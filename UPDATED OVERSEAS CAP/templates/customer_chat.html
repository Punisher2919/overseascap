<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Chat with Admin</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: Arial, sans-serif; background: #f0f2f5; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        header { background: white; padding: 15px; border-bottom: 1px solid #ddd; display: flex; align-items: center; }
        .back-btn { text-decoration: none; color: #333; margin-right: 15px; font-size: 20px; }
        
        #chat-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        
        .msg { max-width: 70%; padding: 10px 15px; border-radius: 18px; font-size: 14px; line-height: 1.4; }
        .msg.you { align-self: flex-end; background: #0084ff; color: white; border-bottom-right-radius: 4px; }
        .msg.admin { align-self: flex-start; background: #e4e6eb; color: black; border-bottom-left-radius: 4px; }

        .input-area { background: white; padding: 15px; display: flex; gap: 10px; border-top: 1px solid #ddd; }
        input { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 20px; outline: none; }
        button { background: #0084ff; color: white; border: none; padding: 0 20px; border-radius: 20px; cursor: pointer; }
    </style>
</head>
<body>

<header>
    <a href="/" class="back-btn"><i class="fas fa-arrow-left"></i></a>
    <strong>Support Chat</strong>
</header>

<div id="chat-container">
    </div>

<div class="input-area">
    <input type="text" id="messageInput" placeholder="Type a message...">
    <button onclick="sendMessage()"><i class="fas fa-paper-plane"></i></button>
</div>

<script>
    async function loadMessages() {
        const res = await fetch('/api/get_messages');
        const data = await res.json();
        const container = document.getElementById('chat-container');
        container.innerHTML = '';
        
        data.history.forEach(m => {
            const div = document.createElement('div');
            div.className = `msg ${m.sender}`;
            div.textContent = m.text;
            container.appendChild(div);
        });
        container.scrollTop = container.scrollHeight;
    }

    async function sendMessage() {
        const input = document.getElementById('messageInput');
        const msg = input.value.trim();
        if(!msg) return;

        await fetch('/api/send_message', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ message: msg })
        });

        input.value = '';
        loadMessages();
    }

    // Refresh every 3 seconds for "real-time" feel
    setInterval(loadMessages, 3000);
    loadMessages();
</script>
</body>
</html>
