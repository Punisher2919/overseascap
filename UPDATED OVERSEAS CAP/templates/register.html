<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Overseas Cap - Register</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        /* --- RESET & BASE --- */
        * { box-sizing: border-box; }

        html, body {
            height: 100vh;
            width: 100vw;
            margin: 0;
            padding: 0;
            overflow: hidden; 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #f4f4f4; 
            display: flex;
            flex-direction: column;
        }

        /* --- ANIMATION KEYFRAMES --- */
        @keyframes entranceAnim {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* --- FIXED HEADER --- */
        header {
            padding: 10px 40px;
            display: flex;
            justify-content: flex-start; 
            align-items: center;
            background: white;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            z-index: 10;
            gap: 12px; 
            flex-shrink: 0;
        }

        .logo { font-size: 26px; font-weight: bold; }
        .logo-img { height: 30px; width: auto; display: block; }

        /* --- REGISTER SECTION --- */
        .register-section {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #f8f8f8 0%, #e9e9e9 100%);
            padding: 10px; /* Reduced padding to fit better */
        }

        .register-card {
            background: white;
            padding: 20px 30px; /* Reduced vertical padding from 30px to 20px */
            width: 100%;
            max-width: 550px; /* Slightly narrower to look more compact */
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
            border: 1px solid rgba(0,0,0,0.05);
            animation: entranceAnim 0.6s ease-out forwards; /* Added Animation */
        }

        .flash-msg {
            background: #fff5f5;
            color: #C4A484;
            padding: 8px;
            border-radius: 8px;
            font-size: 11px;
            font-weight: 600;
            margin-bottom: 12px;
            border: 1px solid #ffebeb;
            text-align: center;
        }

        .header-box {
            text-align: center;
            margin-bottom: 15px; /* Reduced margin */
        }

        .user-avatar { font-size: 32px; color: #C4A484; margin-bottom: 2px; } /* Smaller icon */

        h2 {
            font-size: 10px; /* Slightly smaller */
            letter-spacing: 3px;
            margin: 0;
            font-weight: 700;
            color: #888;
            text-transform: uppercase;
        }

        /* --- FORM GRID --- */
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px; /* Tighter spacing between inputs */
        }

        .full-width {
            grid-column: span 2;
        }

        .input-group {
            position: relative;
        }

        .input-group i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #C4A484; 
            font-size: 13px;
        }

        input {
            width: 100%;
            padding: 10px 12px 10px 45px; /* Thinner inputs */
            border: 1.5px solid #eee;
            border-radius: 10px;
            background: #fdfdfd;
            font-size: 12.5px;
            transition: all 0.3s;
            outline: none;
        }

        input:focus {
            border-color: #C4A484;
            box-shadow: 0 0 0 3px rgba(196, 164, 132, 0.1);
        }

        .btn-row {
            margin-top: 15px; /* Reduced spacing */
            text-align: center;
        }

        .btn-submit {
            width: 100%;
            padding: 12px; /* Thinner button */
            border-radius: 10px;
            font-weight: 700;
            font-size: 13px;
            cursor: pointer;
            background-color: #C4A484;
            color: white;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.3s;
        }

        .btn-submit:hover {
            background-color: #b39374;
            transform: translateY(-1.5px);
        }

        .login-link {
            margin-top: 12px;
            font-size: 10.5px;
            display: block;
            color: #888;
            text-decoration: none;
            font-weight: 600;
            text-align: center;
        }

        .login-link:hover { color: #C4A484; text-decoration: underline; }

       /* --- FOOTER --- */
        footer {
            padding: 20px 40px;
            background: white;
            border-top: 1px solid #eee;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .footer-title {
            font-weight: 800;
            font-size: 10px;
            letter-spacing: 1px;
            color: #aaa;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .social-links {
            display: flex;
            gap: 25px;
        }

        .social-links a {
            text-decoration: none;
            color: #444;
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 11px;
            font-weight: 700;
        }

        .social-links a i {
            font-size: 14px;
            color: #C4A484;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">Overseas Cap</div>
        <img src="{{ url_for('static', filename='logo.png') }}" alt="Logo" class="logo-img">
    </header>

    <div class="register-section">
        <div class="register-card">
            
            {% with messages = get_flashed_messages() %}
              {% if messages %}
                {% for message in messages %}
                  <div class="flash-msg">
                      <i class="fas fa-info-circle"></i> {{ message }}
                  </div>
                {% endfor %}
              {% endif %}
            {% endwith %}

            <div class="header-box">
                <div class="user-avatar"><i class="fas fa-user-plus"></i></div>
                <h2>Create Account</h2>
            </div>

            <form method="POST">
                <div class="form-grid">
                    <div class="input-group">
                        <i class="fas fa-id-badge"></i>
                        <input type="text" name="username" placeholder="Username" required>
                    </div>

                    <div class="input-group">
                        <i class="fas fa-lock"></i>
                        <input type="password" name="password" placeholder="Password" required>
                    </div>

                    <div class="input-group full-width">
                        <i class="fas fa-user"></i>
                        <input type="text" name="full_name" placeholder="Complete Name (e.g. Juan Dela Cruz)" required>
                    </div>

                    <div class="input-group">
                        <i class="fas fa-envelope"></i>
                        <input type="email" name="email" placeholder="Gmail/Email Address" required>
                    </div>

                    <div class="input-group">
                        <i class="fas fa-phone"></i>
                        <input type="text" name="contact" placeholder="Contact Number" required>
                    </div>

                    <div class="input-group full-width">
                        <i class="fas fa-map-marker-alt"></i>
                        <input type="text" name="address" placeholder="Home/Shipping Address" required>
                    </div>
                </div>

                <div class="btn-row">
                    <button type="submit" class="btn-submit">
                        REGISTER <i class="fas fa-check"></i>
                    </button>
                    <a href="/" class="login-link">ALREADY HAVE AN ACCOUNT? LOGIN HERE</a>
                </div>
            </form>
        </div>
    </div>

    <footer>
        <div class="footer-title">About Us: Overseas Cap</div>
        <div class="social-links">
            <a href="https://shopee.ph/jeanodri" target="_blank">
                <i class="fas fa-shopping-bag"></i> 
                <span>SHOPEE.PH/JEANODRI</span>
            </a>
            <a href="https://facebook.com/jeanodri" target="_blank">
                <i class="fab fa-facebook"></i> 
                <span>FACEBOOK.COM/JEANODRI</span>
            </a>
        </div>
    </footer>

</body>
</html>
